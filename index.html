<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I RAEE</title>
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
</head>
<style>
    .mySlides {display:none;}
</style>
<body style="background-color: #519872;">
<h2 class="w3-center" style="background-color: #bec5ad;">I RAEE</h2>
 
<div class="w3-content w3-display-container">
<img class="mySlides" src="IMG 1 RAEE.jpg" style="width: 100%; height: 350px; object-fit: cover;">
<img class="mySlides" src="IMG 2 RAEE.jpg" style="width: 100%; height: 350px; object-fit: cover;">
<img class="mySlides" src="IMG 3 RAEE.jpg" style="width: 100%; height: 350px; object-fit: cover;">
<img class="mySlides" src="img4 raee.jpg" style="width: 100%; height: 350px; object-fit: cover;">
<img class="mySlides" src="img 5 raee.jpg" style="width: 100%; height: 350px; object-fit: cover;">

<button class="w3-button w3-black w3-display-left" onclick="plusDivs(-1)">&#10094;</button>
<button class="w3-button w3-black w3-display-right" onclick="plusDivs(1)">&#10095;</button>
</div>
 
<script>
    var slideIndex = 1;
    showDivs(slideIndex);

    function plusDivs(n) {
    showDivs(slideIndex += n);
    }

    function showDivs(n) {
    var i;
    var x = document.getElementsByClassName("mySlides");
    if (n > x.length) {slideIndex = 1}
    if (n < 1) {slideIndex = x.length}
    for (i = 0; i < x.length; i++) {
        x[i].style.display = "none";  
    }
    x[slideIndex-1].style.display = "block";  
    }
</script>
 
</body>
</html>
